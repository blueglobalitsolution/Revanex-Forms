<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Revanex Forms</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/auth.js"></script>
</head>
<body>
    <div class="app-layout">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h1><img src="/assets/logo.png" alt="Revanex Forms" class="logo-icon" style="height: 48px; width: auto;"></h1>
            </div>
            <div class="sidebar-nav">
                <a href="/dashboard.html"><span class="nav-icon">&#9632;</span> Dashboard</a>
                <a href="/create-form.html"><span class="nav-icon">+</span> Create Form</a>
                <a href="/settings.html" class="active"><span class="nav-icon">&#9881;</span> Settings</a>
            </div>
            <div class="sidebar-footer" style="padding: 16px; border-top: 1px solid #f1efe4; margin-top: auto;">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-weight: 500; font-size: 14px; color: var(--color-text);">
                    <span style="font-size: 18px;">&#128100;</span> <span id="sidebar-username">Loading...</span>
                </div>
                <a href="#" id="logout-btn" class="btn btn-secondary btn-sm" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <span>&#8594;</span> Logout
                </a>
            </div>
        </nav>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h2>Settings</h2>
                    <p>Update your profile information and login credentials</p>
                </div>
            </div>

            <div id="alert-container"></div>

            <div class="card" style="max-width: 600px;">
                <div class="card-header">
                    <h3>Account Settings</h3>
                </div>
                <div class="card-body">
                    <form id="settings-form" onsubmit="handleSaveSettings(event)">
                        <div class="form-group">
                            <label class="form-label" for="settings-username">Username <span class="required">*</span></label>
                            <input type="text" id="settings-username" class="form-input" placeholder="Username" required minlength="3">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="settings-email">Email Address</label>
                            <input type="email" id="settings-email" class="form-input" placeholder="you@example.com">
                            <span class="form-hint">Your email is used for password reset requests</span>
                        </div>

                        <hr style="border:none;border-top:1px solid #f1efe4;margin:var(--space-3) 0">
                        <h4 style="margin-bottom:var(--space-2);font-size:18px;color:var(--color-text)">Change Password</h4>

                        <div class="form-group">
                            <label class="form-label" for="settings-new-password">New Password</label>
                            <input type="password" id="settings-new-password" class="form-input" placeholder="Leave blank to keep current password" minlength="6">
                        </div>

                        <hr style="border:none;border-top:1px solid #f1efe4;margin:var(--space-3) 0">
                        <h4 style="margin-bottom:var(--space-2);font-size:18px;color:var(--color-text)">Confirm Changes</h4>

                        <div class="form-group">
                            <label class="form-label" for="settings-current-password">Current Password <span class="required">*</span></label>
                            <input type="password" id="settings-current-password" class="form-input" placeholder="Verify your current password to save changes" required>
                        </div>

                        <div style="display:flex;justify-content:flex-end;margin-top:var(--space-3)">
                            <button type="submit" class="btn btn-primary" id="save-settings-btn">Save Settings</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="/js/settings.js"></script>
</body>
</html>
